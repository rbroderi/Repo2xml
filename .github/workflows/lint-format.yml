name: Lint and Format
"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  lint-format:
    name: Lint and format checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
      - name: Install project with dev dependencies
        run: uv sync --extra dev
      - name: Run ruff check
        run: uvx ruff check --exclude typings src
      - name: Run ruff format check
        run: uvx ruff format --check --exclude typings src
