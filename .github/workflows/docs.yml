name: Docs
"on":
  push:
    branches: [main]
    paths:
      - src/**
      - src/**
      - docs/**
      - docs_sphinx/**
      - docs_sphinx/**
      - zensical.toml
      - justfile
      - .github/workflows/docs.yml
      - pyproject.toml
      - uv.lock
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Install docs dependencies
        run: uv sync --extra docs
      - name: Build API docs with Sphinx
        run: |
          rm -rf docs_sphinx/apidoc
          rm -rf docs_sphinx/generated
          rm -rf docs/api
          SPHINX_APIDOC_OPTIONS=show-inheritance uv run sphinx-apidoc -f --remove-old -o docs_sphinx/apidoc src/repo2xml src/repo2xml/tests
          find docs_sphinx/apidoc -name '*.rst' -type f -exec sed -i '/^[[:space:]]*:members:$/d;/^[[:space:]]*:undoc-members:$/d' {} +
          uv run sphinx-build -b html docs_sphinx docs/api
      - name: Build docs
        run: uv run zensical build --clean
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
